<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>메모장</title>
<style>
  :root {
    --bg: #f4f5f7;
    --text: #222;
    --text-muted: #444;
    --text-meta: #888;
    --text-empty: #999;
    --card: #fff;
    --border: #e2e4e8;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --accent: #5b8def;
    --accent-hover: #4a7be0;
    --secondary-bg: #eef0f3;
    --secondary-bg-hover: #e2e4e8;
    --secondary-text: #333;
    --danger-text: #d64545;
    --danger-border: #f0c0c0;
    --danger-hover-bg: #fdf0f0;
  }
  [data-theme="dark"] {
    --bg: #1a1b1e;
    --text: #e8e8ea;
    --text-muted: #c0c2c8;
    --text-meta: #888a92;
    --text-empty: #6a6c74;
    --card: #26272b;
    --border: #3a3b40;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --accent: #6b9bff;
    --accent-hover: #82adff;
    --secondary-bg: #34353a;
    --secondary-bg-hover: #42434a;
    --secondary-text: #e0e0e4;
    --danger-text: #ff7575;
    --danger-border: #5a3838;
    --danger-hover-bg: #3a2828;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 32px 16px;
    color: var(--text);
    transition: background 0.2s, color 0.2s;
  }
  .container { max-width: 640px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  h1 { font-size: 24px; }
  .theme-toggle {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 38px;
    height: 38px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }
  .theme-toggle:hover { background: var(--secondary-bg); }
  .editor {
    background: var(--card);
    border-radius: 10px;
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  input, textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 10px;
    resize: vertical;
    background: var(--card);
    color: var(--text);
  }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { min-height: 90px; }
  .actions { display: flex; gap: 8px; justify-content: flex-end; }
  button {
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: var(--secondary-bg); color: var(--secondary-text); }
  .btn-secondary:hover { background: var(--secondary-bg-hover); }
  .btn-danger { background: var(--card); color: var(--danger-text); border: 1px solid var(--danger-border); }
  .btn-danger:hover { background: var(--danger-hover-bg); }
  .memo {
    background: var(--card);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .memo-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .memo-body { font-size: 14px; color: var(--text-muted); white-space: pre-wrap; line-height: 1.5; margin-bottom: 10px; }
  .memo-meta { font-size: 12px; color: var(--text-meta); margin-bottom: 10px; }
  .memo-actions { display: flex; gap: 8px; }
  .empty { text-align: center; color: var(--text-empty); padding: 40px 0; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📝 메모장</h1>
    <button id="themeToggle" class="theme-toggle" aria-label="테마 전환" title="테마 전환">🌙</button>
  </div>

  <div class="editor">
    <input id="title" type="text" placeholder="제목" maxlength="100">
    <textarea id="body" placeholder="내용을 입력하세요..."></textarea>
    <div class="actions">
      <button id="cancelBtn" class="btn-secondary" style="display:none;">취소</button>
      <button id="saveBtn" class="btn-primary">저장</button>
    </div>
  </div>

  <div id="list"></div>
</div>

<script>
const STORAGE_KEY = "memos.v1";
const THEME_KEY = "memos.theme";
const $title = document.getElementById("title");
const $body = document.getElementById("body");
const $saveBtn = document.getElementById("saveBtn");
const $cancelBtn = document.getElementById("cancelBtn");
const $list = document.getElementById("list");
const $themeToggle = document.getElementById("themeToggle");

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  $themeToggle.textContent = theme === "dark" ? "☀️" : "🌙";
}
const savedTheme = localStorage.getItem(THEME_KEY)
  || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
applyTheme(savedTheme);
$themeToggle.addEventListener("click", () => {
  const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
});

let memos = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
let editingId = null;

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(memos));
}

function resetEditor() {
  $title.value = "";
  $body.value = "";
  editingId = null;
  $saveBtn.textContent = "저장";
  $cancelBtn.style.display = "none";
}

function formatDate(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function render() {
  if (memos.length === 0) {
    $list.innerHTML = '<div class="empty">아직 메모가 없습니다.</div>';
    return;
  }
  $list.innerHTML = memos
    .slice()
    .sort((a, b) => b.updatedAt - a.updatedAt)
    .map(m => `
      <div class="memo">
        <div class="memo-title">${escapeHtml(m.title || "(제목 없음)")}</div>
        <div class="memo-body">${escapeHtml(m.body)}</div>
        <div class="memo-meta">${formatDate(m.updatedAt)}${m.updatedAt !== m.createdAt ? " (수정됨)" : ""}</div>
        <div class="memo-actions">
          <button class="btn-secondary" onclick="startEdit('${m.id}')">수정</button>
          <button class="btn-danger" onclick="remove('${m.id}')">삭제</button>
        </div>
      </div>
    `).join("");
}

function startEdit(id) {
  const m = memos.find(x => x.id === id);
  if (!m) return;
  editingId = id;
  $title.value = m.title;
  $body.value = m.body;
  $saveBtn.textContent = "수정 완료";
  $cancelBtn.style.display = "inline-block";
  $title.focus();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function remove(id) {
  if (!confirm("이 메모를 삭제할까요?")) return;
  memos = memos.filter(m => m.id !== id);
  save();
  if (editingId === id) resetEditor();
  render();
}

$saveBtn.addEventListener("click", () => {
  const title = $title.value.trim();
  const body = $body.value.trim();
  if (!title && !body) {
    alert("제목 또는 내용을 입력하세요.");
    return;
  }
  const now = Date.now();
  if (editingId) {
    const m = memos.find(x => x.id === editingId);
    if (m) { m.title = title; m.body = body; m.updatedAt = now; }
  } else {
    memos.push({
      id: String(now) + Math.random().toString(36).slice(2, 7),
      title, body,
      createdAt: now, updatedAt: now,
    });
  }
  save();
  resetEditor();
  render();
});

$cancelBtn.addEventListener("click", resetEditor);

render();
</script>
</body>
</html>
