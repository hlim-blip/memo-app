<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>메모장</title>
<style>
  :root {
    --bg: #f4f5f7;
    --text: #222;
    --text-muted: #444;
    --text-meta: #888;
    --text-empty: #999;
    --card: #fff;
    --border: #e2e4e8;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --accent: #5b8def;
    --accent-hover: #4a7be0;
    --secondary-bg: #eef0f3;
    --secondary-bg-hover: #e2e4e8;
    --secondary-text: #333;
    --danger-text: #d64545;
    --danger-border: #f0c0c0;
    --danger-hover-bg: #fdf0f0;
  }
  [data-theme="dark"] {
    --bg: #1a1b1e;
    --text: #e8e8ea;
    --text-muted: #c0c2c8;
    --text-meta: #888a92;
    --text-empty: #6a6c74;
    --card: #26272b;
    --border: #3a3b40;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --accent: #6b9bff;
    --accent-hover: #82adff;
    --secondary-bg: #34353a;
    --secondary-bg-hover: #42434a;
    --secondary-text: #e0e0e4;
    --danger-text: #ff7575;
    --danger-border: #5a3838;
    --danger-hover-bg: #3a2828;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 32px 16px;
    color: var(--text);
    transition: background 0.2s, color 0.2s;
  }
  .container { max-width: 640px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 8px; flex-wrap: wrap; }
  .header-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  h1 { font-size: 24px; }
  .weather {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 13px;
    color: var(--text-muted);
    box-shadow: var(--shadow);
    cursor: default;
    user-select: none;
  }
  .weather .weather-icon { font-size: 16px; }
  .weather.weather-loading { color: var(--text-meta); }
  .user-info { font-size: 13px; color: var(--text-meta); }
  .theme-toggle, .auth-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 38px;
    height: 38px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }
  .theme-toggle:hover, .auth-btn:hover { background: var(--secondary-bg); }
  .editor {
    background: var(--card);
    border-radius: 10px;
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  input, textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 10px;
    resize: vertical;
    background: var(--card);
    color: var(--text);
  }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { min-height: 90px; }
  .actions { display: flex; gap: 8px; justify-content: flex-end; }
  button {
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-secondary { background: var(--secondary-bg); color: var(--secondary-text); }
  .btn-secondary:hover { background: var(--secondary-bg-hover); }
  .btn-danger { background: var(--card); color: var(--danger-text); border: 1px solid var(--danger-border); }
  .btn-danger:hover { background: var(--danger-hover-bg); }
  .memo {
    background: var(--card);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .memo-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .memo-body { font-size: 14px; color: var(--text-muted); white-space: pre-wrap; line-height: 1.5; margin-bottom: 10px; }
  .memo-meta { font-size: 12px; color: var(--text-meta); margin-bottom: 10px; }
  .memo-actions { display: flex; gap: 8px; }
  .empty { text-align: center; color: var(--text-empty); padding: 40px 0; font-size: 14px; }
  .signin-card {
    background: var(--card);
    border-radius: 10px;
    padding: 32px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .signin-card p { margin-bottom: 16px; color: var(--text-muted); font-size: 14px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>메모장</h1>
      <div id="weather" class="weather weather-loading" title="현재 날씨"><span class="weather-icon">⏳</span><span id="weatherText">날씨 불러오는 중…</span></div>
    </div>
    <div class="header-actions">
      <span id="userInfo" class="user-info"></span>
      <button id="themeToggle" class="theme-toggle" aria-label="테마 전환" title="테마 전환">🌙</button>
      <button id="authBtn" class="auth-btn" aria-label="로그인" title="로그인">👤</button>
    </div>
  </div>

  <div id="signinCard" class="signin-card hidden">
    <p>메모를 사용하려면 Google 계정으로 로그인하세요.</p>
    <button id="signinBtn" class="btn-primary">Google로 로그인</button>
  </div>

  <div id="appView" class="hidden">
    <div class="editor">
      <input id="title" type="text" placeholder="제목" maxlength="100">
      <textarea id="body" placeholder="내용을 입력하세요..."></textarea>
      <div class="actions">
        <button id="cancelBtn" class="btn-secondary" style="display:none;">취소</button>
        <button id="saveBtn" class="btn-primary">저장</button>
      </div>
    </div>

    <div id="list"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import {
  getFirestore, collection, query, where, orderBy, onSnapshot,
  addDoc, updateDoc, deleteDoc, doc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const THEME_KEY = "memos.theme";
const $title = document.getElementById("title");
const $body = document.getElementById("body");
const $saveBtn = document.getElementById("saveBtn");
const $cancelBtn = document.getElementById("cancelBtn");
const $list = document.getElementById("list");
const $themeToggle = document.getElementById("themeToggle");
const $authBtn = document.getElementById("authBtn");
const $signinBtn = document.getElementById("signinBtn");
const $signinCard = document.getElementById("signinCard");
const $appView = document.getElementById("appView");
const $userInfo = document.getElementById("userInfo");
const $weather = document.getElementById("weather");
const $weatherText = document.getElementById("weatherText");
const $weatherIcon = $weather.querySelector(".weather-icon");

function weatherCodeToIcon(code) {
  if (code === 0) return "☀️";
  if (code === 1) return "🌤️";
  if (code === 2) return "⛅";
  if (code === 3) return "☁️";
  if (code === 45 || code === 48) return "🌫️";
  if (code >= 51 && code <= 57) return "🌦️";
  if (code >= 61 && code <= 67) return "🌧️";
  if (code >= 71 && code <= 77) return "❄️";
  if (code >= 80 && code <= 82) return "🌦️";
  if (code >= 85 && code <= 86) return "🌨️";
  if (code >= 95) return "⛈️";
  return "🌡️";
}

function setWeather(icon, text, isLoading = false) {
  $weatherIcon.textContent = icon;
  $weatherText.textContent = text;
  $weather.classList.toggle("weather-loading", isLoading);
}

async function fetchCityName(lat, lon) {
  try {
    const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ko`;
    const res = await fetch(url);
    if (!res.ok) return "";
    const data = await res.json();
    return data.city || data.locality || data.principalSubdivision || "";
  } catch {
    return "";
  }
}

async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("weather fetch failed");
  const data = await res.json();
  return {
    temp: Math.round(data.current.temperature_2m),
    code: data.current.weather_code,
  };
}

async function loadWeather() {
  if (!("geolocation" in navigator)) {
    setWeather("📍", "위치 사용 불가");
    return;
  }
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const { latitude, longitude } = pos.coords;
    try {
      const [weather, city] = await Promise.all([
        fetchWeather(latitude, longitude),
        fetchCityName(latitude, longitude),
      ]);
      const label = city ? `${weather.temp}°C · ${city}` : `${weather.temp}°C`;
      setWeather(weatherCodeToIcon(weather.code), label);
    } catch (err) {
      console.error(err);
      setWeather("⚠️", "날씨 불러오기 실패");
    }
  }, (err) => {
    console.warn("geolocation denied", err);
    setWeather("📍", "위치 권한 없음");
  }, { timeout: 10000, maximumAge: 10 * 60 * 1000 });
}

loadWeather();

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  $themeToggle.textContent = theme === "dark" ? "☀️" : "🌙";
}
const savedTheme = localStorage.getItem(THEME_KEY)
  || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
applyTheme(savedTheme);
$themeToggle.addEventListener("click", () => {
  const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
});

let currentUser = null;
let memos = [];
let editingId = null;
let unsubscribe = null;

function resetEditor() {
  $title.value = "";
  $body.value = "";
  editingId = null;
  $saveBtn.textContent = "저장";
  $cancelBtn.style.display = "none";
}

function formatDate(ts) {
  const d = ts instanceof Date ? ts : new Date(ts);
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function tsToMillis(t) {
  if (!t) return 0;
  if (typeof t === "number") return t;
  if (typeof t.toMillis === "function") return t.toMillis();
  return 0;
}

function render() {
  if (memos.length === 0) {
    $list.innerHTML = '<div class="empty">아직 메모가 없습니다.</div>';
    return;
  }
  $list.innerHTML = memos
    .slice()
    .sort((a, b) => tsToMillis(b.updatedAt) - tsToMillis(a.updatedAt))
    .map(m => {
      const updated = tsToMillis(m.updatedAt);
      const created = tsToMillis(m.createdAt);
      return `
        <div class="memo">
          <div class="memo-title">${escapeHtml(m.title || "(제목 없음)")}</div>
          <div class="memo-body">${escapeHtml(m.body)}</div>
          <div class="memo-meta">${updated ? formatDate(updated) : "..."}${updated && created && updated !== created ? " (수정됨)" : ""}</div>
          <div class="memo-actions">
            <button class="btn-secondary" data-action="edit" data-id="${m.id}">수정</button>
            <button class="btn-danger" data-action="delete" data-id="${m.id}">삭제</button>
          </div>
        </div>
      `;
    }).join("");
}

$list.addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-action]");
  if (!btn) return;
  const id = btn.dataset.id;
  if (btn.dataset.action === "edit") startEdit(id);
  else if (btn.dataset.action === "delete") removeMemo(id);
});

function startEdit(id) {
  const m = memos.find(x => x.id === id);
  if (!m) return;
  editingId = id;
  $title.value = m.title || "";
  $body.value = m.body || "";
  $saveBtn.textContent = "수정 완료";
  $cancelBtn.style.display = "inline-block";
  $title.focus();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function removeMemo(id) {
  if (!confirm("이 메모를 삭제할까요?")) return;
  try {
    await deleteDoc(doc(db, "memos", id));
    if (editingId === id) resetEditor();
  } catch (err) {
    console.error(err);
    alert("삭제에 실패했습니다: " + err.message);
  }
}

$saveBtn.addEventListener("click", async () => {
  if (!currentUser) return;
  const title = $title.value.trim();
  const body = $body.value.trim();
  if (!title && !body) {
    alert("제목 또는 내용을 입력하세요.");
    return;
  }
  $saveBtn.disabled = true;
  try {
    if (editingId) {
      await updateDoc(doc(db, "memos", editingId), {
        title, body, updatedAt: serverTimestamp(),
      });
    } else {
      await addDoc(collection(db, "memos"), {
        userId: currentUser.uid,
        title, body,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
      });
    }
    resetEditor();
  } catch (err) {
    console.error(err);
    alert("저장에 실패했습니다: " + err.message);
  } finally {
    $saveBtn.disabled = false;
  }
});

$cancelBtn.addEventListener("click", resetEditor);

async function doSignIn() {
  try {
    await signInWithPopup(auth, provider);
  } catch (err) {
    console.error(err);
    alert("로그인에 실패했습니다: " + err.message);
  }
}

async function doSignOut() {
  try {
    await signOut(auth);
  } catch (err) {
    console.error(err);
  }
}

$signinBtn.addEventListener("click", doSignIn);
$authBtn.addEventListener("click", () => {
  if (currentUser) {
    if (confirm("로그아웃 할까요?")) doSignOut();
  } else {
    doSignIn();
  }
});

function subscribeMemos(uid) {
  if (unsubscribe) unsubscribe();
  const q = query(collection(db, "memos"), where("userId", "==", uid));
  unsubscribe = onSnapshot(q, (snap) => {
    memos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }, (err) => {
    console.error(err);
    alert("메모를 불러오지 못했습니다: " + err.message);
  });
}

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user) {
    $signinCard.classList.add("hidden");
    $appView.classList.remove("hidden");
    $userInfo.textContent = user.displayName || user.email || "";
    $authBtn.textContent = "🚪";
    $authBtn.title = "로그아웃";
    subscribeMemos(user.uid);
  } else {
    $signinCard.classList.remove("hidden");
    $appView.classList.add("hidden");
    $userInfo.textContent = "";
    $authBtn.textContent = "👤";
    $authBtn.title = "로그인";
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    memos = [];
    resetEditor();
  }
});
</script>
</body>
</html>
